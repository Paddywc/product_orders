name: Build and Test

on:
  push:
    paths:
      - 'auth-service'
      - 'auth-service/**'
      - 'product-service'
      - 'product-service/**'
      - 'order-service'
      - 'order-service/**'
      - 'inventory-service'
      - 'inventory-service/**'
      - 'payment-service'
      - 'payment-service/**'
      - 'ui-service'
      - 'ui-service/**'
      - '.github/workflows/build.yml'
      - 'readme.md'
  pull_request:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth-service
          - product-service
          - order-service
          - inventory-service
          - payment-service
          - ui-service

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          cache-dependency-path: |
            **/pom.xml

      - name: Build and Test
        run: mvn clean verify
        working-directory: ${{ matrix.service }}

      - name: Verify coverage report
        if: always()
        run: |
          EXEC="${{ matrix.service }}/target/jacoco.exec"
          if [ -f "$EXEC" ]; then
            echo "jacoco.exec found ($(wc -c < "$EXEC") bytes) - JaCoCo agent ran"
          else
            echo "jacoco.exec NOT found at $EXEC - JaCoCo agent did NOT run"
          fi
          FILE="${{ matrix.service }}/target/site/jacoco/jacoco.xml"
          if [ -f "$FILE" ]; then
            echo "jacoco.xml found ($(wc -l < "$FILE") lines)"
            head -10 "$FILE"
          else
            echo "jacoco.xml NOT found at $FILE"
            find "${{ matrix.service }}/target" -name "*.xml" 2>/dev/null | head -20 || echo "No target/ directory"
          fi

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ${{ matrix.service }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.service }}
          disable_search: true
          recurse_submodules: true
          verbose: true
          fail_ci_if_error: true
