
services:

  mysql-auth:
    image: mysql:8.0
    env_file:
      - ./auth-service/.env
    volumes:
      - mysql_auth_data:/var/lib/mysql
    ports:
      - "3307:3306"
  auth-service:
    build: ./auth-service
    env_file:
      - ./auth-service/.env
    ports:
      - "8083:8083"

  mysql-products:
    image: mysql:8.0
    env_file:
      - ./product-service/.env
    volumes:
      - mysql_product_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "3308:3306"
  product-service:
    build: ./product-service
    env_file:
      - ./product-service/.env
    ports:
      - "8082:8082"
    depends_on:
      mysql-products:
        condition: service_healthy

  mysql-inventory:
    image: mysql:8.0
    env_file:
      - ./inventory-service/.env
    volumes:
      - mysql_inventory_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "3309:3306"

  inventory-service:
    build: ./inventory-service
    env_file:
      - ./inventory-service/.env
    ports:
      - "8086:8086"
    depends_on:
      mysql-inventory:
        condition: service_healthy

  mysql-order:
    image: mysql:8.0
    env_file:
      - ./order-service/.env
    volumes:
      - mysql_order_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "3310:3306"

  order-service:
    build: ./order-service
    env_file:
      - ./order-service/.env
    ports:
      - "8081:8081"
    depends_on:
      mysql-order:
        condition: service_healthy
  mysql-payment:
    image: mysql:8.0
    env_file:
      - ./payment-service/.env
    volumes:
      - mysql_payment_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "3311:3306"
  payment-service:
    build: ./payment-service
    env_file:
      - ./payment-service/.env
    ports:
      - "8088:8088"
    depends_on:
      mysql-payment:
        condition: service_healthy

  ui-service:
    build: ./ui-service
    ports:
      - "8085:8085"
    env_file:
      - ./ui-service/.env
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  kafka-1:
    image: apache/kafka:3.7.0
    container_name: kafka-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LOG_DIRS: /tmp/kraft-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

  kafka-2:
    image: apache/kafka:3.7.0
    container_name: kafka-2
    ports:
      - "9094:9092"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LOG_DIRS: /tmp/kraft-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

  kafka-3:
    image: apache/kafka:3.7.0
    container_name: kafka-3
    ports:
      - "9095:9092"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LOG_DIRS: /tmp/kraft-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

volumes:
  mysql_auth_data:
  mysql_product_data:
  mysql_inventory_data:
  mysql_order_data:
  mysql_payment_data: